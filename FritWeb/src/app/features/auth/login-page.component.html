<section class="login-page">
  <div class="login-card">
    <h1>Frit</h1>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <label for="tenantCodi">Grup</label>
      <input id="tenantCodi" type="text" formControlName="tenantCodi" autocomplete="organization" />

      <label for="nombre">Usuari</label>
      <input id="nombre" type="text" formControlName="nombre" />

      <label for="password">Contrasenya</label>
      <input id="password" type="password" formControlName="password" />

      <p class="error" *ngIf="error">{{ error }}</p>

      <button type="submit" [disabled]="loading">
        {{ loading ? 'Entrant...' : 'Entrar' }}
      </button>
      <a routerLink="/register" class="secondary-button">Crear usuari</a>
    </form>
  </div>
</section>
