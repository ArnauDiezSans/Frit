<button
  type="button"
  class="menu-toggle"
  [attr.aria-expanded]="menuOpen"
  aria-label="Obre el menu"
  (click)="toggleMenu($event)">
  <span></span>
  <span></span>
  <span></span>
</button>

<nav
  class="app-menu"
  [class.app-menu-open]="menuOpen"
  aria-label="Navegacio principal"
  (click)="closeMenu()">
  <button
    type="button"
    class="menu-button menu-rankings"
    [class.menu-button-active]="activePage === 'rankings'"
    routerLink="/app/rankings">
    Rankings
  </button>
  <button
    type="button"
    class="menu-button menu-la-llista"
    [class.menu-button-active]="activePage === 'laLlista'"
    routerLink="/app/la-llista">
    La llista
  </button>
  <button
    type="button"
    class="menu-button menu-pendent-compra"
    [class.menu-button-active]="activePage === 'pendentCompra'"
    routerLink="/app/pendent-compra">
    Pendent comprar
  </button>
  <button
    type="button"
    class="menu-button menu-a-que-juguem"
    [class.menu-button-active]="activePage === 'aQueJuguem'"
    routerLink="/app/a-que-juguem">
    A què juguem?
  </button>

  <button
    type="button"
    class="menu-button menu-partidas"
    [class.menu-button-active]="activePage === 'partidas'"
    routerLink="/app/partidas">
    Partides
  </button>

  <button
    type="button"
    class="menu-button menu-juegos"
    [class.menu-button-active]="activePage === 'juegos'"
    routerLink="/app/juegos">
    Ludoteca
  </button>

  <button
    *ngIf="primaryLabel"
    type="button"
    class="menu-button menu-button-primary menu-primary-action"
    (click)="onPrimaryAction()">
    {{ primaryLabel }}
  </button>

  <div class="session-actions">
    <button
      type="button"
      class="menu-button refresh-icon-button"
      aria-label="Refrescar"
      title="Refrescar"
      (click)="refresh()">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M20 6v5h-5"></path>
        <path d="M19 11a7 7 0 1 0-2.05 4.95"></path>
      </svg>
    </button>

    <button
      type="button"
      class="menu-button menu-usuario"
      [class.menu-button-active]="activePage === 'usuario'"
      routerLink="/app/usuario">
      Usuari
    </button>

    <button type="button" class="menu-button logout-button" (click)="onLogout()">Sortir</button>
  </div>
</nav>
